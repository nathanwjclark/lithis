name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lithis
          POSTGRES_PASSWORD: lithis-local
          POSTGRES_DB: lithis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lithis"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          LITHIS_TEST_DATABASE_URL: postgres://lithis:lithis-local@localhost:5432/lithis_test

      - name: Stub census (honesty gate)
        run: bun run stubscan --json stub-census.json

      - name: Lint (module boundaries + no bare stubs)
        run: bun run lint

      - name: Upload stub census
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stub-census
          path: stub-census.json
          if-no-files-found: ignore
