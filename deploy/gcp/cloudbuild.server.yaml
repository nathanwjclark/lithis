# Cloud Build config for the lithis server image (context = repo root).
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "deploy/docker/Dockerfile.server", "-t", "${_IMAGE}", "."]
images:
  - "${_IMAGE}"
substitutions:
  _IMAGE: "" # supplied by 50-build-images.sh
options:
  logging: CLOUD_LOGGING_ONLY
